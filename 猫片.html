<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #app {
            width: 600px;
            height: 600px;
            margin: 0 auto;
        }
        #app h1,.tu {
            text-align: center;
        }

        .tu img {
            width: 500px;
            height: 500px;
        }
    </style>
    <title>Document</title>
</head>
<body>
    <div id="app">
        <h1>随机猫片</h1>
        <div class="tu">
            <img :src="urlImg">
            <button @click="mao">获取随机猫的图片</button>
            <p>{{ err }}</p>
        </div>
    </div>
    <script  src="vue3.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        Vue.createApp({
            data() {
                return {
                    urlImg: '',
                    err: ''
                }
            },
            methods: {
                mao() {
                    axios.get('https://api.thecatapi.com/v1/images/search')
                    .then(res => {
                        this.urlImg = res.data[0].url
                    })
                    .catch(err => {
                        this.err = '获取错误' + err.message
                    })
                }
            },
        }).mount("#app")
    </script>
</body>
</html>
