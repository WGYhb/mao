<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体样式 */
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }

        #app {
            width: 90%;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 30px 20px;
            transition: all 0.3s ease;
        }

        /* 标题样式 */
        #app h1 {
            text-align: center;
            color: #2d3748;
            font-size: 2.2rem;
            margin-bottom: 25px;
            position: relative;
            padding-bottom: 15px;
        }

        #app h1::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        /* 图片容器样式 */
        .tu {
            text-align: center;
        }

        .tu img {
            width: 100%;
            max-width: 500px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            object-fit: cover;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .tu img:hover {
            transform: scale(1.02);
        }

        /* 按钮样式 */
        .tu button {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .tu button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .tu button:active {
            transform: translateY(0);
        }

        /* 错误提示样式 */
        .tu p {
            color: #e53e3e;
            font-size: 0.95rem;
            margin-top: 10px;
            padding: 8px 15px;
            border-radius: 8px;
            background: #fef2f2;
            display: inline-block;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            #app {
                padding: 20px 15px;
            }

            #app h1 {
                font-size: 1.8rem;
            }

            .tu button {
                padding: 10px 25px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            #app {
                width: 95%;
            }

            #app h1 {
                font-size: 1.5rem;
            }
        }
    </style>
    <title>随机猫片</title>
</head>
<body>
    <div id="app">
        <h1>随机猫片</h1>
        <div class="tu">
            <img :src="urlImg" alt="可爱的猫咪">
            <button @click="mao">获取随机猫的图片</button>
            <p v-if="err">{{ err }}</p> <!-- 增加v-if，无错误时不显示 -->
        </div>
    </div>
    <script src="vue3.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        Vue.createApp({
            data() {
                return {
                    urlImg: '',
                    err: ''
                }
            },
            methods: {
                mao() {
                    // 清空之前的错误提示
                    this.err = '';
                    axios.get('https://api.thecatapi.com/v1/images/search')
                    .then(res => {
                        this.urlImg = res.data[0].url
                    })
                    .catch(err => {
                        this.err = '获取错误：' + err.message
                    })
                }
            },
        }).mount("#app")
    </script>
</body>
</html>
